repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: ruff check --fix --exit-non-zero-on-fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff-format
        entry: ruff format
        language: system
        types: [python]

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy --config-file=pyproject.toml
        language: system
        types: [python]
        pass_filenames: false
        args: [orchestrator/]

  - repo: local
    hooks:
      - id: frontend-typecheck
        name: frontend-typecheck
        entry: bash -c 'cd frontend && npm run typecheck'
        language: system
        files: ^frontend/
        types_or: [ts, tsx]
        pass_filenames: false
      - id: frontend-lint
        name: frontend-lint
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/
        types_or: [ts, tsx]
        pass_filenames: false
      - id: frontend-test
        name: frontend-test
        entry: bash -c 'cd frontend && npm run test'
        language: system
        files: ^frontend/
        types_or: [ts, tsx]
        pass_filenames: false

rules:
  # ── Injection ────────────────────────────────────────────────

  - id: subprocess-shell-true
    patterns:
      - pattern: subprocess.$FUNC(..., shell=True, ...)
    message: >
      Avoid shell=True in subprocess calls — risk of command injection.
      Pass command as a list instead.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      owasp: A03:2021 Injection

  - id: os-system-call
    pattern: os.system(...)
    message: >
      os.system() is vulnerable to command injection.
      Use subprocess.run() with a list of arguments instead.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      owasp: A03:2021 Injection

  - id: eval-usage
    pattern: eval(...)
    message: >
      eval() executes arbitrary code. Avoid it entirely or use
      ast.literal_eval() for safe evaluation of literals.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      owasp: A03:2021 Injection

  - id: exec-usage
    pattern: exec(...)
    message: >
      exec() executes arbitrary code and should not be used
      with untrusted input.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      owasp: A03:2021 Injection

  # ── Broken Access Control / Security Misconfiguration ────────

  - id: hardcoded-password
    patterns:
      - pattern: $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|secret|api_key|apikey|token|auth)
    message: >
      Possible hardcoded credential in variable '$VAR'.
      Use environment variables or a secrets manager instead.
    languages: [python]
    severity: WARNING
    metadata:
      category: security
      owasp: A07:2021 Identification and Authentication Failures

  - id: flask-debug-true
    pattern: app.run(..., debug=True, ...)
    message: >
      Debug mode exposes detailed error pages and enables
      the interactive debugger. Never use in production.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      owasp: A05:2021 Security Misconfiguration

  # ── Cryptographic Failures ───────────────────────────────────

  - id: weak-hash-md5
    pattern: hashlib.md5(...)
    message: >
      MD5 is cryptographically broken. Use hashlib.sha256()
      or stronger for security-sensitive hashing.
    languages: [python]
    severity: WARNING
    metadata:
      category: security
      owasp: A02:2021 Cryptographic Failures

  - id: weak-hash-sha1
    pattern: hashlib.sha1(...)
    message: >
      SHA-1 is deprecated for security use. Use hashlib.sha256()
      or stronger.
    languages: [python]
    severity: WARNING
    metadata:
      category: security
      owasp: A02:2021 Cryptographic Failures

  # ── Insecure Deserialization ─────────────────────────────────

  - id: pickle-load
    patterns:
      - pattern: pickle.load(...)
      - pattern: pickle.loads(...)
    message: >
      pickle deserialization can execute arbitrary code.
      Use JSON or another safe serialization format.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      owasp: A08:2021 Software and Data Integrity Failures

  - id: yaml-unsafe-load
    pattern: yaml.load(...)
    message: >
      yaml.load() without Loader is unsafe. Use
      yaml.safe_load() or yaml.load(data, Loader=yaml.SafeLoader).
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      owasp: A08:2021 Software and Data Integrity Failures

  # ── SSRF / Unvalidated Requests ──────────────────────────────

  - id: requests-no-timeout
    patterns:
      - pattern: requests.get(...)
      - pattern-not: requests.get(..., timeout=..., ...)
    message: >
      HTTP request without timeout can hang indefinitely.
      Always pass timeout= parameter.
    languages: [python]
    severity: WARNING
    metadata:
      category: security
      owasp: A10:2021 Server-Side Request Forgery

  - id: requests-verify-false
    patterns:
      - pattern: requests.$METHOD(..., verify=False, ...)
    message: >
      Disabling SSL verification exposes connections to
      man-in-the-middle attacks.
    languages: [python]
    severity: ERROR
    metadata:
      category: security
      owasp: A02:2021 Cryptographic Failures

  # ── TypeScript / Frontend ────────────────────────────────────

  - id: ts-innerhtml
    pattern: $EL.innerHTML = $VAL
    message: >
      Direct innerHTML assignment can lead to XSS.
      Use textContent or a sanitization library.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      category: security
      owasp: A03:2021 Injection

  - id: ts-dangerously-set-html
    pattern: dangerouslySetInnerHTML={...}
    message: >
      dangerouslySetInnerHTML can lead to XSS if the value
      is not properly sanitized.
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      category: security
      owasp: A03:2021 Injection
